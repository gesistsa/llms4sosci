name: quarto-r-binder
channels:
  - conda-forge
dependencies:
  - python=3.11
  - jupyterlab

  # Core R
  - r-base=4.3
  - r-knitr
  - r-rmarkdown

  # Packages used in the tutorial / examples
  - r-httr
  - r-jsonlite
  - r-readr
  - r-dplyr
  - r-purrr
  - r-tidyr

  # Packages currently installed in install.R for interactive use
  - r-ggplot2
  - r-lubridate
  - r-tidytext
  - r-stopwords